<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>배민 페스타 - 정적 이미지</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .card {
      position: relative;
      width: 480px;
      height: 480px;
      background: #3EDDD0;
      border-radius: 24px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4); /* 사진 느낌을 위한 그림자 추가 */
    }
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      line-height: 1;
      pointer-events: none; /* 텍스트 선택 방지 */
    }
    .sub {
      font-size: 19px;
      font-weight: 700;
      color: #111;
      margin-bottom: 8px;
    }
    .title {
      font-size: 100px;
      font-weight: 900;
      color: #111;
      letter-spacing: -6px;
      line-height: 0.88;
    }
    .date {
      margin-top: 20px;
      font-size: 26px;
      font-weight: 900;
      color: #111;
    }
    .badge {
      position: absolute;
      z-index: 11;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 900;
    }
    /* 뱃지 위치 및 색상 유지 */
    .b1{width:52px;height:52px;font-size:20px;background:#FF3E82;color:#fff;top:6%;left:20%;}
    .b2{width:52px;height:52px;font-size:20px;background:#00B84C;color:#fff;top:4%;right:4%;}
    .b3{width:36px;height:36px;font-size:14px;background:#007A6E;color:#fff;top:38%;right:4%;}
    .b4{width:58px;height:58px;font-size:22px;background:#FF3E82;color:#fff;bottom:10%;left:32%;}
    .b5{width:36px;height:36px;font-size:14px;background:#00B84C;color:#fff;bottom:4%;right:32%;}
    .b6{width:52px;height:52px;font-size:20px;background:#F9D62B;color:#111;bottom:4%;right:12%;}
    .b7{width:70px;height:70px;font-size:28px;background:#007A6E;color:#fff;bottom:0%;left:-2%;}
  </style>
</head>
<body>
<div class="card">
  <canvas id="c"></canvas>
  <div class="badge b1">%</div><div class="badge b2">%</div>
  <div class="badge b3">%</div><div class="badge b4">%</div>
  <div class="badge b5">%</div><div class="badge b6">%</div>
  <div class="badge b7">%</div>
  
  <div class="content">
    <div class="sub">배달부터 장보기까지</div>
    <div class="title">배민<br>페스타</div>
    <div class="date">3.2 - 3.29</div>
  </div>
</div>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const W = 480, H = 480;
  canvas.width = W; canvas.height = H;
  
  const COLORS = ['#FF3E82', '#00B84C', '#F9D62B', '#4A90E2', '#FFFFFF'];

  function drawPill(x, y, angle, len, thick, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    const r = thick / 2;
    ctx.beginPath();
    ctx.roundRect(-len/2, -r, len, thick, r); // 최신 브라우저용 간결한 코드
    ctx.fillStyle = color;
    ctx.fill();
    ctx.restore();
  }

  function renderStaticBackground() {
    ctx.clearRect(0, 0, W, H);
    const cx = W / 2, cy = H / 2;
    
    // 링 데이터 정의 (개수, 반지름, 초기 오프셋)
    const rings = [
      { count: 18, r: 195, offset: 0 },
      { count: 15, r: 160, offset: 0.4 },
      { count: 13, r: 125, offset: 0.8 },
      { count: 10, r: 92, offset: 1.2 },
      { count: 8, r: 62, offset: 1.6 }
    ];

    rings.forEach(ring => {
      for (let i = 0; i < ring.count; i++) {
        const angle = (Math.PI * 2 / ring.count) * i + ring.offset;
        const x = cx + Math.cos(angle) * ring.r;
        const y = cy + Math.sin(angle) * ring.r;
        
        // 랜덤 속성값들 (정적이지만 배치 시 다양함을 위함)
        const color = COLORS[Math.floor(Math.random() * COLORS.length)];
        const len = 16 + Math.random() * 14;
        const thick = 5 + Math.random() * 4;
        const pillAngle = angle + Math.PI / 2;

        drawPill(x, y, pillAngle, len, thick, color);
      }
    });
  }

  // 한 번만 실행
  renderStaticBackground();
</script>
</body>
</html>
